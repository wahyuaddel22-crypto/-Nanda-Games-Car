<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love at Full Speed 🏎️</title>
    <link href="https://fonts.googleapis.com/css2?family=Racing+Sans+One&family=Playfair+Display:ital,wght=0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #e63946;
            --dark-red: #9b1d24;
            --cream: #fdf6ec;
            --gold: #c9a84c;
            --dark: #0a0507;
            --mid: #1f0b0f;
            --asphalt: #14141f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: var(--dark);
            color: var(--cream);
            font-family: 'DM Sans', sans-serif;
            overflow-x: hidden;
        }

        /* ====== INTRO / LANDING ====== */
        #intro {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            overflow: hidden;
            background: radial-gradient(ellipse at center bottom, #3a0d14 0%, var(--dark) 75%);
        }

        .road-lines {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 45%;
            overflow: hidden;
            perspective: 300px;
        }

        .road-lines::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(to bottom, transparent 0px, transparent 50px, var(--gold) 50px, var(--gold) 75px);
            transform: rotateX(50deg) scaleX(0.25);
            transform-origin: bottom center;
            animation: rushLines 0.6s linear infinite;
            opacity: 0.2;
        }

        @keyframes rushLines {
            from { transform: rotateX(50deg) scaleX(0.25) translateY(0); }
            to { transform: rotateX(50deg) scaleX(0.25) translateY(125px); }
        }

        .intro-car {
            font-size: 5.5rem;
            animation: floatCar 2.5s ease-in-out infinite;
            filter: drop-shadow(0 10px 25px rgba(230,57,70,0.5));
            margin-bottom: 1rem;
        }

        @keyframes floatCar {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(3deg); }
        }

        .intro-title {
            font-family: 'Racing Sans One', cursive;
            font-size: clamp(2.8rem, 8vw, 5.5rem);
            color: var(--cream);
            text-shadow: 0 0 30px var(--red), 0 0 60px rgba(230,57,70,0.6);
            line-height: 1;
            letter-spacing: -0.02em;
        }

        .intro-sub {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: clamp(1.1rem, 3vw, 1.5rem);
            color: var(--gold);
            margin-top: 1rem;
            opacity: 0.9;
        }

        .btn-custom {
            margin-top: 2.5rem;
            padding: 1rem 3.5rem;
            background: linear-gradient(135deg, var(--red), var(--dark-red));
            color: white;
            border: none;
            font-family: 'Racing Sans One', cursive;
            font-size: 1.3rem;
            letter-spacing: 0.05em;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(230,57,70,0.4);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            z-index: 2;
        }

        .btn-custom:hover {
            transform: scale(1.05) translateY(-3px);
            box-shadow: 0 0 45px rgba(230,57,70,0.8);
        }

        .btn-custom:active {
            transform: scale(0.98) translateY(0);
        }

        /* ====== SECTION LAYOUT ====== */
        section {
            min-height: 100vh;
            padding: 6rem 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .section-title {
            font-family: 'Racing Sans One', cursive;
            font-size: clamp(2.2rem, 5vw, 3.8rem);
            text-align: center;
            margin-bottom: 3.5rem;
            letter-spacing: 0.02em;
            line-height: 1.1;
        }

        .section-title span {
            color: var(--red);
            text-shadow: 0 0 25px rgba(230,57,70,0.5);
        }

        /* ====== LOVE LETTER ====== */
        #letter {
            background: radial-gradient(ellipse at top, #25090f 0%, var(--dark) 70%);
        }

        .letter-card {
            max-width: 650px;
            width: 100%;
            background: linear-gradient(145deg, #fffaf4 0%, #fcf3e8 100%);
            color: #2b1a11;
            border-radius: 8px;
            padding: 3.5rem 2.5rem;
            box-shadow: 0 25px 70px rgba(0,0,0,0.5), inset 0 0 0 10px rgba(201,168,76,0.08);
            position: relative;
            border: 1px solid rgba(201,168,76,0.3);
        }

        .letter-stamp {
            position: absolute;
            top: 2rem;
            right: 2rem;
            font-size: 2.5rem;
            transform: rotate(12deg);
            filter: drop-shadow(2px 4px 5px rgba(0,0,0,0.15));
        }

        .letter-headline {
            font-family: 'Racing Sans One', cursive;
            font-size: 2rem;
            color: var(--dark-red);
            margin-bottom: 0.3rem;
        }

        .letter-date {
            font-size: 0.85rem;
            color: #8c7361;
            font-style: italic;
            margin-bottom: 2.5rem;
        }

        .letter-body {
            font-family: 'Playfair Display', serif;
            font-size: 1.15rem;
            line-height: 1.85;
        }

        .
